name: Release

# Builds a signed Android App Bundle (.aab) for Play Store upload.
#
# Triggers:
#   - Pushing a tag like `v1.2.3` → builds, then attaches artifacts to a
#     GitHub Release.
#   - Manual `workflow_dispatch` → builds artifacts only (no Release created);
#     optionally override the version name.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of android/upload-keystore.jks
#                              (macOS: base64 -i android/upload-keystore.jks | pbcopy)
#   ANDROID_KEYSTORE_PASSWORD  store password
#   ANDROID_KEY_PASSWORD       key password (same as store for PKCS12 keystores)
#   ANDROID_KEY_ALIAS          key alias (e.g. "upload")
# Optional (runtime config baked in via --dart-define; empty if unset):
#   SUPABASE_URL, SUPABASE_ANON_KEY
#
# iOS signing/upload is not yet wired (needs Apple certs + App Store Connect
# API key) — tracked separately under WOE-056.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Version name override (e.g. 1.2.3). Defaults to pubspec.'
        required: false
        type: string

jobs:
  android-release:
    name: Build signed Android bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Releases and upload assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Fail fast with a clear message if signing secrets are missing ────────
      - name: Check signing secrets are configured
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. See README → Release signing (CI)."
            exit 1
          fi

      # ── Node + CesiumJS bundle (same as CI) ──────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: web_globe/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web_globe/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Build CesiumJS bundle
        run: bash scripts/build_globe.sh

      # ── Flutter ──────────────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Code generation (drift + riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Reconstruct the upload keystore + key.properties from secrets ────────
      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/android/upload-keystore.jks"
          # Absolute storeFile path: Gradle's file() resolves a relative path
          # against android/app/, not android/. (See README → Release signing.)
          cat > "$GITHUB_WORKSPACE/android/key.properties" <<EOF
          storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # ── Derive version name (tag → strip leading v; else dispatch input) ─────
      - name: Determine version name
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.build_name }}" ]]; then
            echo "VERSION_NAME=${{ inputs.build_name }}" >> "$GITHUB_ENV"
          fi

      # ── Build signed bundle + universal APK ──────────────────────────────────
      # build-number = run_number keeps versionCode unique and monotonic so
      # Play Console never rejects a duplicate. VERSION_NAME (if set) overrides
      # the pubspec version name; otherwise pubspec wins.
      - name: Build signed app bundle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build appbundle --release \
            --build-number=${{ github.run_number }} \
            ${VERSION_NAME:+--build-name=$VERSION_NAME} \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Build signed APK (universal, for direct install / QA)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            ${VERSION_NAME:+--build-name=$VERSION_NAME} \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      # ── Sanity-check: bundle is signed with the upload key, not debug ────────
      - name: Verify signature
        run: |
          if ! jarsigner -verify build/app/outputs/bundle/release/app-release.aab | grep -q "jar verified"; then
            echo "::error::app-release.aab failed signature verification"
            exit 1
          fi
          if jarsigner -verify -verbose -certs \
              build/app/outputs/bundle/release/app-release.aab \
              | grep -q "CN=Android Debug"; then
            echo "::error::bundle was signed with the DEBUG key — check key.properties"
            exit 1
          fi
          echo "Signature OK (non-debug certificate)."

      # ── Publish ──────────────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/app/outputs/bundle/release/app-release.aab \
            build/app/outputs/flutter-apk/app-release.apk \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

      # ── Always wipe signing material from the workspace ──────────────────────
      - name: Clean up signing material
        if: always()
        run: |
          rm -f "$GITHUB_WORKSPACE/android/upload-keystore.jks" \
                "$GITHUB_WORKSPACE/android/key.properties"
