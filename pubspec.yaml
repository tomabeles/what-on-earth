name: what_on_earth
description: "What On Earth?! — ISS AR viewer"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # WebView
  flutter_inappwebview: ^6.1.5

  # Sensors
  sensors_plus: ^7.0.0

  # Camera
  camera: ^0.11.0
  permission_handler: ^11.3.1

  # SQLite ORM
  drift: ^2.30.0
  drift_flutter: ^0.2.4

  # Local HTTP server (tile serving)
  shelf: ^1.4.2
  shelf_static: ^1.1.3
  shelf_router: ^1.1.4

  # HTTP client
  dio: ^5.7.0

  # Filesystem
  path_provider: ^2.1.4
  path: ^1.9.0

  # Secure storage (magnetometer calibration params)
  flutter_secure_storage: ^9.2.2

  # Cloud sync backend
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Fonts
  google_fonts: ^6.2.1

  # Preferences
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  connectivity_plus: ^6.1.1
  background_fetch: ^1.2.0
  wakelock_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.30.0
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  fake_async: ^1.3.1
  build_verify: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/globe/
